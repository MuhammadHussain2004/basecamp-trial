<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booking Form</title>
  </head>
  <body>
    <nav>
      <h2>BaseCamp Tria</h2>
      <button>Save and exit</button>
    </nav>
    <h2>Complete your booking</h2>
    <p>1 Details</p>
    <hr />
    <p>2 Payment</p>
    <hr />
    <p>3 Confirm</p>

    <form>
      <h3>Personal details</h3>
      <hr />
      <label>Full name</label>
      <input type="text" placeholder="e.g. Ayesha Khan" />
      <label>Email</label>
      <input type="email" placeholder="ayeha@" />
      <input type="number" placeholder="+92 3xx xxxxxxx" />
      <label>Trip date</label>
      <input type="date" />

      <h4>Trip preferences</h4>
      <hr />

      <label >Number of travellers</label>
      <select>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
      </select>

      <label>Fitness Level</label>
      <input type="radio">Beginner
      <input type="radio" checked>Intermdiate
      <input type="radio">Advanced
      <br/>
      <label>Adds-ons</label>
      <input type="checkbox" checked> Gear Rental bundle
      <input type="checkbox">Track insurace
      <input type="checkbox">Airport pickup
      <br/>
      <label>special requests</label>
      <textarea placeholder="Any delivery restrictions or accessibility needs..."  cols="50" rows="10"></textarea>
      <br/>
      <input type="checkbox">I agree to the terms and cancellation policy
      <br/>
      <button>Back</button>
      <button>continue to payment</button>
    </form>

     <footer>
        &copy; 2026 BaseCamp Trial
      
     </footer>
  </body>
</html>
