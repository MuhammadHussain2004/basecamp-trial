<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styling/global.css" />
    <link rel="stylesheet" href="styling/BookingForm.css" />
    <title>Book a Trip</title>
  </head>
  <body>

    <!-- navbar -->
    <nav class="header">
      <h2><a href="index.html" style="text-decoration:none;color:inherit;">BaseCamp Trail</a></h2>
      <a href="trips.html" class="save-exit">Save and exit</a>
    </nav>

    <div class="form-wrapper">
      <h1>Complete your booking</h1>

      <!-- stepper -->
      <div class="stepper">
        <div class="step active">
          <div class="step-circle">1</div>
          <span class="step-label">Details</span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-circle">2</div>
          <span class="step-label">Payment</span>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-circle">3</div>
          <span class="step-label">Confirm</span>
        </div>
      </div>

      <form>
        <!-- personal details -->
        <fieldset>
          <legend>Personal details</legend>
          <div class="form-row">
            <div class="form-group">
              <label for="name">Full name</label>
              <input type="text" id="name" placeholder="e.g. Ayesha Khan" />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" placeholder="you@example.com" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" placeholder="+92 3xx xxxxxxx" />
            </div>
            <div class="form-group">
              <label for="tripdate">Trip date</label>
              <input type="date" id="tripdate" />
            </div>
          </div>
        </fieldset>

        <!-- trip preferences -->
        <fieldset>
          <legend>Trip preferences</legend>
          <div class="form-row">
            <div class="form-group">
              <label for="travelers">Number of travelers</label>
              <select id="travelers">
                <option>1</option>
                <option selected>2</option>
                <option>3</option>
                <option>4+</option>
              </select>
            </div>
            <div class="form-group">
              <label>Fitness level</label>
              <div class="radio-group">
                <label class="radio-opt"><input type="radio" name="fitness" /> Beginner</label>
                <label class="radio-opt"><input type="radio" name="fitness" checked /> Intermediate</label>
                <label class="radio-opt"><input type="radio" name="fitness" /> Advanced</label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Add-ons</label>
            <div class="checkbox-group">
              <label class="check-opt"><input type="checkbox" checked /> Gear rental bundle</label>
              <label class="check-opt"><input type="checkbox" /> Travel insurance</label>
              <label class="check-opt"><input type="checkbox" /> Airport pickup</label>
            </div>
          </div>

          <div class="form-group">
            <label for="notes">Special requests</label>
            <textarea id="notes" placeholder="Any dietary restrictions or accessibility needs..."></textarea>
          </div>
        </fieldset>

        <!-- consent -->
        <label class="consent">
          <input type="checkbox" />
          I agree to the terms and cancellation policy
        </label>

        <!-- actions -->
        <div class="form-actions">
          <a href="tripsDetail.html" class="btn-back">Back</a>
          <button type="submit" class="btn-continue">Continue to payment</button>
        </div>
      </form>
    </div>

    <!-- footer -->
    <footer class="site-footer">
      &copy; 2026 BaseCamp Trail
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="trips.html">Trips</a></li>
        <li><a href="GearRental.html">Gear</a></li>
        <li><a href="About-Contact.html">About</a></li>
      </ul>
    </footer>

  </body>
</html>
